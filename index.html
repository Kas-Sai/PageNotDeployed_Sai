<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080a0f;
      --surface:  #0e1117;
      --border:   rgba(255,255,255,0.07);
      --text:     #e8eaf0;
      --muted:    #5a6070;
      --accent:   #00e5a0;
      --accent2:  #00b8ff;
      --glow:     rgba(0, 229, 160, 0.18);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      overflow: hidden;
    }

    /* ── noise grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    /* ── ambient blobs ── */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.13;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 {
      width: 520px; height: 520px;
      background: var(--accent);
      top: -160px; left: -160px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: var(--accent2);
      bottom: -120px; right: -100px;
      animation-delay: -5s;
    }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* ── grid lines ── */
    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
    }

    /* ── main layout ── */
    .stage {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* ── status chip ── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 999px;
      border: 1px solid rgba(0, 229, 160, 0.3);
      background: rgba(0, 229, 160, 0.06);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.2s;
    }
    .chip-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── headline ── */
    .headline {
      font-size: clamp(3.2rem, 9vw, 7.5rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 1.6rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.45s;
    }
    .headline em {
      font-style: normal;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── subtext ── */
    .sub {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.78rem, 1.6vw, 0.95rem);
      color: var(--muted);
      max-width: 420px;
      line-height: 1.75;
      margin-bottom: 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.65s;
    }

    /* ── divider line ── */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0 auto 3rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    /* ── terminal block ── */
    .terminal {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 1s;
    }
    .terminal .prompt { color: var(--accent); }
    .terminal .cmd    { color: var(--text); }
    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--accent);
      border-radius: 1px;
      animation: blink 1.1s step-end infinite;
      vertical-align: middle;
      margin-left: 2px;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── corner badges ── */
    .corner {
      position: fixed;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      opacity: 0;
      animation: fadeIn 1s ease forwards 1.4s;
    }
    .corner-tl { top: 28px; left: 32px; }
    .corner-tr { top: 28px; right: 32px; text-align: right; }
    .corner-bl { bottom: 28px; left: 32px; }
    .corner-br { bottom: 28px; right: 32px; text-align: right; }

    /* ── animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- blobs + grid -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="grid"></div>

  <!-- corner labels -->
  <div class="corner corner-tl">STATUS<br/>OFFLINE</div>
  <div class="corner corner-tr">v0.0.1<br/>STAGING</div>
  <div class="corner corner-bl">© 2025</div>
  <div class="corner corner-br">DEPLOY<br/>PENDING</div>

  <!-- main content -->
  <main class="stage">
    <div class="chip">
      <span class="chip-dot"></span>
      Not Deployed Yet
    </div>

    <h1 class="headline">
      Something<br/><em>Big</em> is<br/>Coming.
    </h1>

    <p class="sub">
      This page is currently under construction.<br/>
      We're putting the final touches on it —<br/>
      check back soon.
    </p>

    <div class="divider"></div>

    <div class="terminal">
      <span class="prompt">~$</span>
      <span class="cmd">npm run deploy</span>
      <span class="cursor"></span>
    </div>
  </main>

</body>
</html>
